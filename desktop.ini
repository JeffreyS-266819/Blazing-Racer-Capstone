public static ListNode removeLast(ListNode head, int target) {
    if (head == null)
        return null;
    ListNode current = head;
    ListNode lastTarget = null;
    ListNode prevToLast = null;
    ListNode prev = null;
    while (current != null) {
        if (current.val == target) {
            lastTarget = current;
            prevToLast = prev;
        }
        prev = current;
        current = current.next;
    }
    if (lastTarget == null)
        return head;
    if (prevToLast == null)
        return head.next;
    prevToLast.next = lastTarget.next;
    return head;
}